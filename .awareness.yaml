name: awareness
kind: library

runtime:
  enabled: false
  adapter: null

languages:
  go: true
  yaml: true
  markdown: true

source_roots:
  - cmd
  - bundle
  - knowledge
  - preflight
  - project
  - runtime
  - graph
  - evidence
  - finding

awareness:
  root: .awareness
  invariants:
    - .awareness/invariants.yaml
  failure_modes:
    - .awareness/failure_modes.yaml
  forbidden_fixes:
    - .awareness/forbidden_fixes.yaml
  incident_patterns:
    - .awareness/incident_patterns.yaml
  # Extended knowledge files (optional — load via knowledge.Load(root)):
  # decisions.yaml, forbidden_assumptions.yaml, required_tests.yaml,
  # subsystem_boundaries.yaml, authority_rules.yaml,
  # preflight_questions.yaml, remediation_contracts.yaml
