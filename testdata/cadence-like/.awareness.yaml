name: cadence
kind: application
root_markers:
  - go.mod
  - package.json
  - .git

languages:
  go: true
  typescript: true
  proto: true
  yaml: true
  markdown: true

source_roots:
  - .
  - runtime
  - model

awareness:
  root: .awareness
  invariants:
    - .awareness/invariants.yaml
  failure_modes:
    - .awareness/failure_modes.yaml
  forbidden_fixes:
    - .awareness/forbidden_fixes.yaml
  decisions_dir: .awareness/decisions
  proposals_dir: .awareness/proposals

runtime:
  enabled: false
  adapter: null

graph:
  cache_dir: .awareness/cache
  freshness_ttl: 24h
  invalidate_on:
    - source_mtime_change
    - awareness_file_mtime_change

mcp:
  project_aware: true
  resolve_profile_from: cwd
