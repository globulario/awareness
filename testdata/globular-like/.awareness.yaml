name: globular-services
kind: distributed-platform
root_markers:
  - go.mod
  - .git

languages:
  go: true
  typescript: true
  proto: true
  yaml: true
  markdown: true

source_roots:
  - golang
  - proto
  - docs
  - scripts

awareness:
  root: .awareness
  invariants:
    - .awareness/invariants.yaml
  failure_modes:
    - .awareness/failure_modes.yaml
  forbidden_fixes:
    - .awareness/forbidden_fixes.yaml
  causal_rules:
    - .awareness/causal_rules.yaml
  context_aliases:
    - .awareness/context_aliases.yaml
  decisions_dir: .awareness/decisions
  proposals_dir: .awareness/proposals

runtime:
  enabled: true
  adapter: globular

graph:
  cache_dir: .awareness/cache
  freshness_ttl: 24h
  invalidate_on:
    - source_mtime_change
    - awareness_file_mtime_change
    - go_mod_change

mcp:
  project_aware: true
  resolve_profile_from: cwd
