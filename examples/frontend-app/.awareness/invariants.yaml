    stale_after_days: 90

  - id: ui.error_boundary.preserve_context
    title: Error boundaries must preserve diagnostic context, not blank the operator screen
    severity: high
    status: active
    summary: A rendering failure must not erase selected resource identity, visible warnings, last-known data, or safe recovery options.
    description: |
      Scope error boundaries to the failing component, not the entire view. The fallback
      must show which component failed, preserve the resource URL, offer a safe retry,
      and not hide critical warning state that was already visible.
    files:
      - src/**/*.tsx
      - apps/**/*.tsx
      - packages/**/*.tsx
    forbidden_fixes:
      - ui.fix.error_boundary_blanks_operator_context
      - ui.fix.error_boundary_hides_critical_warning
    related_failure_modes:
