    stale_after_days: 90

  - id: ui.cache.generation_invalidation
    title: Frontend caches for operator-critical state must invalidate on authority generation change
    severity: high
    status: active
    summary: Time-only TTL is insufficient for operator-critical state. Cache entries must include authority generation for invalidation.
    description: |
      A frontend cache that outlives the backend generation it represents shows the operator
      stale truth. Cache invalidation must be driven by backend generation, resource revision,
      version, or explicit invalidation event — not time alone.
    files:
      - src/**/*.ts
      - apps/**/*.ts
      - packages/**/*.ts
    forbidden_fixes:
      - ui.fix.time_only_cache_for_operator_state
      - ui.fix.cache_not_invalidated_on_backend_generation_change
    related_failure_modes:
      - fm.ui.time_only_cache_hides_backend_change
    required_tests:
      - cache invalidates when generation changes
      - permission cache invalidates when user or role changes
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.cache_invalidation
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
