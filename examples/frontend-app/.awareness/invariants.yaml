      - destructive warning visible on mobile
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.visual_contract
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.ai_text.must_bind_to_backend_truth
    title: AI-generated UI text must not invent state
    severity: high
    status: active
    summary: AI-generated explanations may decorate, but must bind to real backend status, action, defer-until, or failure data.
    description: |
      AI text may be humorous, ceremonial, or explanatory, but it must not invent success,
      failure, permission, workflow state, or required action. Every claim about system
      state must be traceable to backend data or a declared derivation rule.
    files:
      - src/**/*.ts
      - src/**/*.tsx
      - apps/**/*.ts
      - apps/**/*.tsx
    forbidden_fixes:
      - ui.fix.ai_invents_state
    related_failure_modes:
      - fm.ui.ai_text_unbound_from_truth
    required_tests:
      - AI explanation includes real workflow status
      - AI explanation does not produce success when workflow is failed
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.ai_explanation_contract
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  # ── Frontend execution mechanics invariants ───────────────────────────────────

  - id: ui.update.partial_refresh_required
    title: Updates must refresh the smallest responsible UI region
    severity: high
    status: active
    summary: Full page reloads are forbidden when a targeted data-holder or component refresh can propagate the change.
    description: |
      Full page reloads destroy operator context: expanded panels, selected node, filter
      state, scroll position, warning visibility, and diagnostic flow. A reload that hides
      a local state bug is a deferred bug, not a fix.
    files:
      - src/**/*.tsx
      - apps/**/*.tsx
      - packages/**/*.tsx
    forbidden_fixes:
      - ui.fix.full_page_reload_for_local_state_change
      - ui.fix.refresh_screen_to_hide_state_bug
    related_failure_modes:
      - fm.ui.full_page_reload_masks_state_bug
    required_tests:
      - data holder refresh does not reload whole page
      - expanded panel survives data refresh
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.partial_update
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.dom_event.contract_required
    title: DOM events for cross-component sync must have a typed, scoped contract
    severity: high
    status: active
    summary: CustomEvent names must be namespaced, payloads must be typed, and consumers must validate before applying to state.
    description: |
      Unnamespaced events (refresh, update, changed) become an invisible global bus.
      Untyped payloads applied to state without validation corrupt state silently.
      Frontend event detail is a cache invalidation signal — not backend truth.
    files:
      - src/**/*.ts
      - src/**/*.tsx
      - apps/**/*.ts
      - apps/**/*.tsx
    forbidden_fixes:
      - ui.fix.global_event_bus_without_contract
      - ui.fix.untyped_custom_event_payload
      - ui.fix.event_detail_as_backend_truth
    related_failure_modes:
      - fm.ui.untyped_dom_event_causes_wrong_refresh
    required_tests:
      - DOM event has typed payload contract
      - malformed event does not mutate authoritative state
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.dom_event_contract
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.data_holder.cache_not_authority
    title: Data holders are rendering caches, not sources of backend truth
    severity: critical
    status: active
    summary: Component stores, DOM datasets, and frontend singletons must not hold backend-authoritative fields as their source of truth.
    description: |
      Local UI state (selection, expansion, draft, filter) may live in a data holder.
      Backend authority (runtime health, installed version, permissions, topology) must
      always be sourced from a backend fetch or subscription — not from a data holder
      that may be stale or out of date.
    files:
      - src/**/*.ts
      - src/**/*.tsx
      - apps/**/*.ts
      - apps/**/*.tsx
    forbidden_fixes:
      - ui.fix.data_holder_as_status_authority
      - ui.fix.dom_dataset_as_backend_truth
    related_failure_modes:
      - fm.ui.data_holder_becomes_authority
    required_tests:
      - data holder invalidates on backend event
      - data holder does not invent runtime status
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.data_holder_contract
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.async.no_stale_response_overwrite
    title: Late async responses must not overwrite newer UI state
    severity: high
    status: active
    summary: Concurrent requests against the same target state must use abort, generation, or revision guards.
    description: |
      A slow response arriving after a newer request silently reverts the UI. Use
      AbortController, request generation counters, or resource revision checks to
      discard responses that are no longer current.
    files:
      - src/**/*.ts
      - src/**/*.tsx
      - apps/**/*.ts
      - apps/**/*.tsx
    forbidden_fixes:
      - ui.fix.accept_last_arriving_response_as_latest
      - ui.fix.no_abort_or_generation_for_concurrent_requests
    related_failure_modes:
      - fm.ui.stale_async_response_reverts_state
    required_tests:
      - late response does not overwrite newer state
      - aborted request does not mutate component state
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.async_guard
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.subscription.lifecycle_owned
    title: Components must own cleanup for every listener, subscription, or polling loop they register
    severity: high
    status: active
    summary: Leaked listeners cause duplicate refreshes, stale mutations, and memory leaks after unmount.
    description: |
      Every addEventListener, setInterval, subscribe, WebSocket, EventSource, or gRPC-web
      stream registration must have a matching cleanup that fires on component teardown.
      The cleanup must run even on error-triggered unmount.
    files:
      - src/**/*.ts
      - src/**/*.tsx
      - apps/**/*.ts
      - apps/**/*.tsx
    forbidden_fixes:
      - ui.fix.listener_without_cleanup
      - ui.fix.polling_loop_survives_component_unmount
      - ui.fix.stale_subscription_updates_new_screen
    related_failure_modes:
      - fm.ui.listener_leak_duplicates_refresh
    required_tests:
      - component unmount removes DOM listener
      - subscription cleanup prevents duplicate refresh
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.subscription_lifecycle
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.list.stable_backend_key
    title: Dynamic lists must key rows by stable backend identity
    severity: high
    status: active
    summary: Array index, display name, and sort position are forbidden as list keys for anything that can reorder, filter, or sort.
    description: |
      When list order changes (sort, filter, drag, real-time update), unstable keys
      move component state to the wrong row — silently mismatching selection, expansion,
      and inline edit state.
    files:
      - src/**/*.tsx
      - apps/**/*.tsx
      - packages/**/*.tsx
    forbidden_fixes:
      - ui.fix.list_key_uses_array_index
      - ui.fix.display_name_as_identity
    related_failure_modes:
      - fm.ui.index_key_moves_row_state
    required_tests:
      - list reorder preserves row state by backend ID
      - filtered list does not move state between rows
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.list_identity
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.state.empty_loading_unknown_distinct
    title: Empty, loading, unknown, stale, denied, and failed states must be visually distinct
    severity: high
    status: active
    summary: Collapsing any two of these states into a generic UI state hides the true operational condition.
    description: |
      Permission denied must not look like empty. Backend failure must not look like
      loading forever. Unknown must not look like healthy. Stale data must be visibly
      marked. Empty success requires a positive authoritative response.
    files:
      - src/**/*.tsx
      - apps/**/*.tsx
      - packages/**/*.tsx
    forbidden_fixes:
      - ui.fix.spinner_hides_backend_failure
      - ui.fix.empty_state_hides_permission_denied
      - ui.fix.unknown_rendered_as_empty_success
    related_failure_modes:
      - fm.ui.permission_denied_rendered_as_empty
    required_tests:
      - permission denied not rendered as empty list
      - backend failure not rendered as infinite spinner
      - unknown state not rendered as healthy
    proven_by:
      tests: []
      incidents: []
    used_by:
      preflight_rules:
        - frontend.state_distinction
      evidence_contracts: []
    last_verified: "2026-05-17"
    verified_by:
      - frontend-awareness-v1
    stale_after_days: 90

  - id: ui.form.idempotent_submit
    title: Mutating form submissions must be idempotent or single-flight guarded
    severity: high
    status: active
    summary: Double-click, Enter repeat, and network retry must not create duplicate workflows or mutations.
    description: |
      Submit controls must be disabled while a request is in flight, or the operation
      must use an idempotency key. Retry must reuse the original operation identity
      when the backend supports it.
    files:
      - src/**/*.tsx
      - apps/**/*.tsx
      - packages/**/*.tsx
    forbidden_fixes:
      - ui.fix.double_submit_starts_duplicate_workflow
      - ui.fix.retry_creates_new_mutation_without_idempotency_key
    related_failure_modes:
