    stale_after_days: 90

  - id: ui.navigation.operational_context_shareable
    title: Operationally relevant screen state must survive reload and navigation
    severity: medium
    status: active
    summary: Selected node, service, workflow run, filter, and time range must not live only in ephemeral component state for diagnostic screens.
    description: |
      Ephemeral component state is lost on navigation, reload, or URL share. For
      diagnostic and operational screens, the operator's selection context must be
      recoverable via route params, query params, or durable local storage.
    files:
      - src/**/*.tsx
      - apps/**/*.tsx
    forbidden_fixes:
