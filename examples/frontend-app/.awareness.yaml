name: globular-admin
kind: application

root_markers:
  - package.json
  - pnpm-workspace.yaml
  - .git

source_roots:
  - src
  - apps
  - packages

languages:
  go: false
  typescript: true
  proto: false
  yaml: true
  markdown: true

awareness:
  root: .awareness
  invariants:
    - .awareness/invariants.yaml
  failure_modes:
    - .awareness/failure_modes.yaml
  forbidden_fixes:
    - .awareness/forbidden_fixes.yaml
  decisions_dir: .awareness/decisions
  proposals_dir: .awareness/proposals

runtime:
  enabled: false
  adapter: null

graph:
  cache_dir: .awareness/cache
  freshness_ttl: 24h
  invalidate_on:
    - src/**/*.ts
    - src/**/*.tsx
    - apps/**/*.ts
    - apps/**/*.tsx
    - packages/**/*.ts
    - packages/**/*.tsx
    - .awareness/**/*.yaml

mcp:
  project_aware: true
  resolve_profile_from: cwd
